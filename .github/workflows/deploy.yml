name: Deploy

on:
  issue_comment:
    types:
      - created

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEPLOY_APPS: documenso

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: startsWith(github.event.comment.body, '/deploy')

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Add eyes reaction to deployment comment
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -d '{"content":"eyes"}'

      - name: Get env name
        shell: bash
        run: |
          comment='${{ github.event.comment.body }}'
          env_name=$(echo "$comment" | awk '{print $2}')
          echo "requested_env_name=${env_name}" >> $GITHUB_ENV
          echo "Environment: ${env_name}"

      - name: Validate environment name
        shell: bash
        run: |
          env_name="${{ env.requested_env_name }}"
          if [[ "${env_name}" != "stg" && "${env_name}" != stg-* ]]; then
            echo "❌ Invalid environment: '${env_name}'. Only 'stg' and any of 'stg-*' are supported."

            echo '{
              "body": "❌ **Deployment Failed**\n\nInvalid environment: `'"${env_name}"'`\n\nSupported environments: `stg`, `stg-*`\n\nUsage: `/deploy <environment>`"
            }' > error_payload.json

            curl -L \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
              --data @error_payload.json

            curl -L \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
              -d '{"content":"confused"}'

            exit 1
          fi

      - name: Get head ref from PR
        shell: bash
        run: |
          resp=$(curl -sSf \
            --url ${{ github.event.issue.pull_request.url }} \
            --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' \
            --header 'content-type: application/json')
          head_ref=$(jq -r '.head.ref' <<< "$resp")
          echo "head_ref=$head_ref" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.head_ref }}

      - name: Set version
        shell: bash
        run: |
          git fetch --tags
          if version=$(git describe --tags --no-abbrev 2>/dev/null); then
            echo "version=${version}" >> $GITHUB_ENV
            echo "VERSION_AVAILABLE=true" >> $GITHUB_ENV
          else
            echo "❌ No version tag found for this commit. Image may not be built yet."
            echo "VERSION_AVAILABLE=false" >> $GITHUB_ENV

            echo '{
              "body": "❌ **Deployment Failed**\n\nNo version tag found for this commit. The Docker image may not be built yet.\n\nPlease wait for the build to complete and try again."
            }' > no_version_payload.json

            curl -L \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
              --data @no_version_payload.json

            curl -L \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
              -d '{"content":"confused"}'

            exit 1
          fi

      - name: Trigger deploy in k8s repo
        if: env.VERSION_AVAILABLE == 'true'
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TRIGERRER_TOKEN }}
        run: |
          set -eux
          gh workflow run deploy.yml \
            --repo=${{ github.repository_owner }}/k8s --ref=main \
            -f app=documenso \
            -f app_version="${version}" \
            -f env=${requested_env_name}

      - name: Post deployment success
        if: env.VERSION_AVAILABLE == 'true'
        run: |
          env_name="${{ env.requested_env_name }}"
          version="${{ env.version }}"

          echo '{
            "body": "✅ **Deployment triggered successfully!**\n\n**Environment:** `'"${env_name}"'`\n**Version:** `'"${version}"'`\n**Services:** '"${DEPLOY_APPS}"'"
          }' > success_payload.json

          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            --data @success_payload.json

          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -d '{"content":"rocket"}'
